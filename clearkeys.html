<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear Keys</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #toggle-size { margin: 20px; }
    </style>
</head>
<body>
    <h1>Clear Keys</h1>
    <label for="toggle-size">Toggle Trackpad Size:</label>
    <input type="checkbox" id="toggle-size">
    <div id="trackpad">
        <p>Swipe gestures:</p>
        <p>3 finger swipe up/down to control volume</p>
        <p>4 finger swipe left/right to enable one-handed mode</p>
    </div>
    <script>
        const toggleSize = document.getElementById('toggle-size');
        const trackpad = document.getElementById('trackpad');

        toggleSize.addEventListener('change', function() {
            if (this.checked) {
                trackpad.style.fontSize = '1.5em'; // Large Size
            } else {
                trackpad.style.fontSize = '1em'; // Normal Size
            }
        });

        let initialY = null;
        let initialX = null;
        trackpad.addEventListener('touchstart', function(e) {
            const touch = e.touches[0];
            initialY = touch.clientY;
            initialX = touch.clientX;
        });

        trackpad.addEventListener('touchmove', function(e) {
            if (initialY === null || initialX === null) return;
            const touch = e.touches[0];
            const diffY = touch.clientY - initialY;
            const diffX = touch.clientX - initialX;

            if (Math.abs(diffY) > Math.abs(diffX)) {
                if (diffY > 0) {
                    // Swipe Down
                    console.log('Volume Up');
                } else {
                    // Swipe Up
                    console.log('Volume Down');
                }
                initialY = touch.clientY; // Reset initial position for continuous swiping
            } else {
                if (diffX > 0) {
                    // Swipe Right
                    console.log('Enable One-Handed Mode');
                } else {
                    // Swipe Left
                    console.log('Disable One-Handed Mode');
                }
                initialX = touch.clientX; // Reset initial position for continuous swiping
            }
        });
    </script>
</body>
</html>
