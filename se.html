<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Sound Editor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── DARK THEME (default) ── */
:root {
–bg: #0a0a0f; –surface: #12121a; –surface2: #0e0e16; –surface3: #16161f;
–border: #1e1e2e; –border2: #2a2a3e;
–text: #e8e8f0; –muted: #5a5a7a; –muted2: #3a3a5a;
–accent: #c8f0a0; –accent2: #f0c8a0; –accent3: #a0c8f0;
–danger: #f08080; –success: #a0f0c0;
–glow: rgba(200,240,160,0.12);
–thumb-sz: 22px; –track-h: 5px;
}

/* ── LIGHT THEME ── */
body.light {
–bg: #f4f4ef; –surface: #ffffff; –surface2: #eeeee8; –surface3: #e4e4dc;
–border: #d0d0c4; –border2: #bebeb0;
–text: #1a1a12; –muted: #7a7a62; –muted2: #b0b099;
–accent: #3a7a10; –accent2: #a05a10; –accent3: #1a5a8a;
–danger: #c02020; –success: #1a7a3a;
–glow: rgba(58,122,16,0.08);
}

html { scroll-behavior: smooth; }
body {
background: var(–bg); color: var(–text);
font-family: ‘DM Mono’, monospace;
min-height: 100vh; padding-bottom: 60px;
transition: background .2s, color .2s;
}

/* ── TOP BAR ── */
.top-bar {
position: sticky; top: 0; z-index: 50;
display: flex; align-items: center; justify-content: space-between;
padding: .55rem 1.1rem;
background: var(–bg); border-bottom: 1px solid var(–border);
gap: .65rem; transition: background .2s, border-color .2s;
}
.top-bar h1 {
font-family: ‘Syne’, sans-serif; font-size: .92rem; font-weight: 800;
letter-spacing: -.02em;
}
.top-bar h1 span { color: var(–accent); }
.top-actions { display: flex; gap: .4rem; align-items: center; flex-shrink: 0; }

.theme-toggle {
background: var(–surface); border: 1px solid var(–border);
border-radius: 20px; padding: .26rem .7rem;
cursor: pointer; font-family: ‘DM Mono’, monospace;
font-size: .6rem; color: var(–muted); letter-spacing: .05em;
transition: all .15s; white-space: nowrap;
}
.theme-toggle:hover { border-color: var(–accent); color: var(–accent); }

.btn-export-all {
background: var(–accent); color: var(–bg); border: none;
border-radius: 3px; padding: .36rem .8rem;
font-family: ‘DM Mono’, monospace; font-size: .64rem; font-weight: 500;
cursor: pointer; letter-spacing: .04em; transition: opacity .15s; white-space: nowrap;
}
.btn-export-all:hover { opacity: .82; }
.btn-export-all:disabled { opacity: .4; cursor: not-allowed; }

/* ── MAIN LAYOUT ── */
.page { padding: .95rem 1.1rem; display: flex; flex-direction: column; gap: .6rem; }

/* ── SOUND CARD ── */
.sound-card {
background: var(–surface); border: 1px solid var(–border);
border-radius: 5px; overflow: hidden; transition: border-color .2s, background .2s;
}
.sound-card.modified { border-color: var(–accent2); }
.sound-card.saved { border-color: var(–accent); }

.card-header {
display: flex; align-items: center; gap: .7rem;
padding: .58rem .9rem; cursor: pointer; user-select: none;
background: var(–surface2); border-bottom: 1px solid transparent;
transition: background .15s, border-color .2s;
}
.card-header:hover { background: var(–surface3); }
.card-header.open { border-bottom-color: var(–border); }

.card-icon { font-size: 1.1rem; flex-shrink: 0; }
.card-meta { flex: 1; min-width: 0; }
.card-label {
font-family: ‘Syne’, sans-serif; font-weight: 700; font-size: .8rem;
letter-spacing: -.01em; display: flex; align-items: center; gap: .4rem; flex-wrap: wrap;
}
.card-desc { font-size: .55rem; color: var(–muted); letter-spacing: .04em; margin-top: .08rem; }
.badge {
font-size: .43rem; padding: .05rem .25rem; border-radius: 2px;
letter-spacing: .06em; text-transform: uppercase; border: 1px solid; flex-shrink: 0;
}
.badge-modified { color: var(–accent2); border-color: var(–accent2); }
.badge-saved { color: var(–accent); border-color: var(–accent); }
.badge-custom { color: var(–accent3); border-color: var(–accent3); }

.card-actions { display: flex; gap: .35rem; align-items: center; flex-shrink: 0; }
.card-chevron { color: var(–muted); font-size: .65rem; transition: transform .2s; flex-shrink: 0; margin-left: .1rem; }
.card-header.open .card-chevron { transform: rotate(180deg); }

/* ── BUTTONS ── */
.btn {
border: 1px solid var(–border); border-radius: 3px;
font-family: ‘DM Mono’, monospace; font-size: .61rem;
padding: .32rem .65rem; cursor: pointer; transition: all .15s;
white-space: nowrap; letter-spacing: .03em; background: var(–surface2); color: var(–text);
}
.btn-play { }
.btn-play:hover { border-color: var(–accent); color: var(–accent); }
.btn-play.playing { border-color: var(–accent); color: var(–accent); animation: pulseBtn .6s ease-in-out infinite alternate; }
.btn-save-card { background: var(–accent); color: var(–bg); border-color: var(–accent); font-weight: 700; }
.btn-save-card:hover { opacity: .82; }
.btn-export-card { color: var(–accent3); border-color: var(–accent3); }
.btn-export-card:hover { background: var(–accent3); color: var(–bg); }
.btn-reset { background: none; color: var(–muted); }
.btn-reset:hover { border-color: var(–danger); color: var(–danger); }
.btn-add-layer { background: none; color: var(–accent); border-color: var(–accent2); border-style: dashed; flex: 1; }
.btn-add-layer:hover { background: var(–glow); }

.btn-layer-play {
background: none; border: 1px solid var(–border); border-radius: 3px;
color: var(–muted); font-size: .54rem; padding: .2rem .42rem;
cursor: pointer; transition: all .15s; font-family: ‘DM Mono’, monospace; flex-shrink: 0;
min-width: 28px; text-align: center;
}
.btn-layer-play:hover { border-color: var(–accent); color: var(–accent); }
.btn-layer-play.playing { border-color: var(–accent); color: var(–accent); }

@keyframes pulseBtn {
from { box-shadow: 0 0 0 0 rgba(200,240,160,0); }
to   { box-shadow: 0 0 0 3px rgba(200,240,160,0.18); }
}

/* ── EDITOR BODY ── */
.card-body { display: none; padding: .85rem; flex-direction: column; gap: .8rem; }
.card-body.open { display: flex; }

/* ── SECTION TITLE ── */
.section-title {
font-size: .54rem; color: var(–muted); letter-spacing: .12em; text-transform: uppercase;
margin-bottom: .55rem; display: flex; align-items: center; gap: .55rem;
}
.section-title::after { content: ‘’; flex: 1; height: 1px; background: var(–border); }

/* ── REPEAT + GAP ── */
.repeat-section {
background: var(–surface2); border: 1px solid var(–border);
border-radius: 4px; padding: .6rem .8rem; display: flex; flex-direction: column; gap: .5rem;
}
.repeat-top { display: flex; align-items: center; gap: .7rem; flex-wrap: wrap; }
.repeat-label { font-size: .56rem; color: var(–muted); letter-spacing: .1em; text-transform: uppercase; flex-shrink: 0; }
.repeat-counter { display: flex; align-items: center; gap: .5rem; }
.rep-btn {
width: 30px; height: 30px; border-radius: 50%;
background: var(–surface); border: 1px solid var(–border);
color: var(–text); font-size: .95rem; cursor: pointer;
display: flex; align-items: center; justify-content: center;
transition: all .15s; flex-shrink: 0; user-select: none;
}
.rep-btn:hover { border-color: var(–accent); color: var(–accent); }
.rep-btn:active { transform: scale(.92); }
.rep-count { font-size: .95rem; color: var(–accent); min-width: 2rem; text-align: center; font-weight: 500; }
.repeat-note { font-size: .5rem; color: var(–muted); margin-left: auto; }

.gap-row { display: flex; align-items: center; gap: .6rem; }
.gap-label { font-size: .54rem; color: var(–muted); letter-spacing: .07em; text-transform: uppercase; flex-shrink: 0; min-width: 60px; }

/* ── GLOBAL SECTION ── */
.global-section {
background: var(–surface2); border: 1px solid var(–border);
border-radius: 4px; padding: .65rem .8rem;
}
.global-grid { display: flex; flex-direction: column; gap: .58rem; }
.global-ctrl { display: flex; flex-direction: column; gap: .26rem; }
.global-ctrl > label { font-size: .52rem; color: var(–muted); letter-spacing: .07em; text-transform: uppercase; }

/* ── SLIDER SYSTEM ── */
.slider-wrap { display: flex; align-items: center; gap: .5rem; }
.slider-wrap input[type=range] { flex: 1; min-width: 0; }

/* The tappable value display */
.val-tap {
font-size: .64rem; color: var(–accent); font-family: ‘DM Mono’, monospace;
min-width: 3.2rem; text-align: right; flex-shrink: 0;
cursor: pointer; border-bottom: 1px dashed var(–muted2);
padding-bottom: 1px; transition: color .15s, border-color .15s;
user-select: none;
}
.val-tap:hover { color: var(–accent2); border-color: var(–accent); }
.val-tap.is-global { color: var(–accent2); }
body.light .val-tap.is-global { color: var(–accent2); }

/* ── RANGE INPUTS — big for mobile ── */
input[type=range] {
-webkit-appearance: none; appearance: none;
width: 100%; height: var(–track-h);
background: var(–border); border-radius: 3px;
outline: none; cursor: pointer;
transition: background .15s;
}
input[type=range]::-webkit-slider-thumb {
-webkit-appearance: none;
width: var(–thumb-sz); height: var(–thumb-sz);
border-radius: 50%; background: var(–accent);
cursor: pointer; border: 2px solid var(–bg);
box-shadow: 0 1px 5px rgba(0,0,0,.3);
transition: transform .1s;
}
input[type=range]:active::-webkit-slider-thumb { transform: scale(1.22); }
input[type=range].global-rng::-webkit-slider-thumb { background: var(–accent2); }
input[type=range].global-rng { background: var(–border2); }

/* ── LAYERS ── */
.layers-section { display: flex; flex-direction: column; gap: .42rem; }
.layer-card {
background: var(–surface2); border: 1px solid var(–border);
border-radius: 4px; overflow: hidden;
}
.layer-header {
display: flex; align-items: center; gap: .5rem;
padding: .5rem .7rem; cursor: pointer; user-select: none; transition: background .15s;
}
.layer-header:hover { background: var(–surface3); }
.layer-num {
width: 20px; height: 20px; border-radius: 50%;
background: var(–border); color: var(–muted);
font-size: .52rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.layer-type-badge {
font-size: .5rem; padding: .04rem .22rem; border-radius: 2px;
background: var(–border); color: var(–muted2);
letter-spacing: .04em; text-transform: uppercase; flex-shrink: 0;
}
.layer-summary {
font-size: .56rem; color: var(–muted); flex: 1;
overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0;
}
.layer-actions { display: flex; align-items: center; gap: .28rem; flex-shrink: 0; }
.layer-delete {
background: none; border: none; color: var(–muted2); cursor: pointer;
font-size: .72rem; padding: .15rem .35rem; border-radius: 2px; transition: all .15s;
}
.layer-delete:hover { color: var(–danger); background: rgba(240,128,128,.1); }
.layer-chevron { color: var(–muted2); font-size: .58rem; transition: transform .2s; flex-shrink: 0; }
.layer-header.open .layer-chevron { transform: rotate(180deg); }

.layer-params { display: none; padding: .6rem .75rem; border-top: 1px solid var(–border); }
.layer-params.open { display: block; }

.param-grid { display: flex; flex-direction: column; gap: .55rem; }
.param-item { display: flex; flex-direction: column; gap: .24rem; }
.param-item > label { font-size: .52rem; color: var(–muted); letter-spacing: .07em; text-transform: uppercase; }
.param-item select {
width: 100%; background: var(–surface); border: 1px solid var(–border);
border-radius: 3px; padding: .42rem .5rem; color: var(–text);
font-family: ‘DM Mono’, monospace; font-size: .68rem; outline: none; cursor: pointer;
-webkit-appearance: none; appearance: none;
}
.param-item select:focus { border-color: var(–accent); }

/* ── CARD FOOTER ── */
.card-footer {
display: flex; gap: .42rem; padding: .6rem .9rem;
background: var(–surface2); border-top: 1px solid var(–border);
flex-wrap: wrap; align-items: center;
}
.footer-spacer { flex: 1; }

.export-status {
font-size: .56rem; color: var(–muted); letter-spacing: .04em;
padding: .26rem .5rem; background: var(–surface2);
border: 1px solid var(–border); border-radius: 3px; display: none;
}
.export-status.visible { display: block; }
.export-status.ok { color: var(–success); border-color: var(–success); }
.export-status.err { color: var(–danger); border-color: var(–danger); }

/* ── NUMBER INPUT MODAL ── */
.num-overlay {
position: fixed; inset: 0; background: rgba(0,0,0,.52);
display: flex; align-items: flex-end; justify-content: center;
z-index: 300; opacity: 0; pointer-events: none; transition: opacity .2s;
}
body.light .num-overlay { background: rgba(0,0,0,.28); }
.num-overlay.open { opacity: 1; pointer-events: all; }
.num-sheet {
background: var(–surface); border: 1px solid var(–border);
border-radius: 12px 12px 0 0; padding: 1.3rem 1.3rem 2rem;
width: 100%; max-width: 440px;
display: flex; flex-direction: column; gap: .8rem;
transform: translateY(24px); transition: transform .22s;
}
.num-overlay.open .num-sheet { transform: translateY(0); }
.num-sheet-title { font-family: ‘Syne’, sans-serif; font-size: .95rem; font-weight: 700; }
.num-sheet-sub { font-size: .58rem; color: var(–muted); letter-spacing: .04em; }
.num-sheet input[type=number] {
width: 100%; background: var(–surface2); border: 1px solid var(–border);
border-radius: 4px; padding: .8rem 1rem; color: var(–text);
font-family: ‘DM Mono’, monospace; font-size: 1.5rem; font-weight: 500;
outline: none; text-align: center;
-moz-appearance: textfield;
}
.num-sheet input[type=number]::-webkit-inner-spin-button,
.num-sheet input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
.num-sheet input[type=number]:focus { border-color: var(–accent); }
.num-range-hint { font-size: .56rem; color: var(–muted); text-align: center; }
.num-actions { display: flex; gap: .5rem; }
.num-actions button {
flex: 1; padding: .68rem; border-radius: 4px;
font-family: ‘DM Mono’, monospace; font-size: .75rem;
cursor: pointer; border: 1px solid var(–border); transition: all .15s;
}
.num-ok { background: var(–accent); color: var(–bg); border-color: var(–accent); font-weight: 700; }
.num-ok:hover { opacity: .85; }
.num-cancel { background: none; color: var(–muted); }
.num-cancel:hover { border-color: var(–muted); color: var(–text); }

/* ── TOAST ── */
.toast {
position: fixed; bottom: 1.4rem; left: 50%;
transform: translateX(-50%) translateY(18px);
background: var(–surface); border: 1px solid var(–accent);
color: var(–accent); padding: .48rem 1.1rem;
border-radius: 4px; font-size: .68rem; letter-spacing: .05em;
opacity: 0; transition: all .22s; z-index: 999; white-space: nowrap; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(–bg); }
::-webkit-scrollbar-thumb { background: var(–border2); border-radius: 3px; }

@media (max-width: 480px) {
.top-bar { padding: .48rem .85rem; }
.page { padding: .7rem .85rem; }
.card-header { padding: .52rem .82rem; }
.card-body { padding: .7rem .82rem; }
.card-footer { padding: .52rem .82rem; }
}
</style>

</head>
<body>

<div class="top-bar">
  <h1>⚙ <span>Sounds</span></h1>
  <div class="top-actions">
    <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">☀ Light</button>
    <button class="btn-export-all" id="exportAllBtn" onclick="exportAll()">⬇ ZIP</button>
  </div>
</div>

<div class="page" id="cardsContainer"></div>

<!-- Number input bottom sheet -->

<div class="num-overlay" id="numOverlay" onclick="closeNum(event)">
  <div class="num-sheet">
    <div>
      <div class="num-sheet-title" id="numTitle">Set Value</div>
      <div class="num-sheet-sub" id="numSub"></div>
    </div>
    <input type="number" id="numInput" inputmode="decimal">
    <div class="num-range-hint" id="numHint"></div>
    <div class="num-actions">
      <button class="num-cancel" onclick="closeNum()">Cancel</button>
      <button class="num-ok" onclick="confirmNum()">Apply</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
// THEME
// ═══════════════════════════════════════════════════════
let isLight = false;
function toggleTheme() {
  isLight = !isLight;
  document.body.classList.toggle('light', isLight);
  document.getElementById('themeBtn').textContent = isLight ? '☽ Dark' : '☀ Light';
}

// ═══════════════════════════════════════════════════════
// AUDIO ENGINE
// ═══════════════════════════════════════════════════════
let audioCtx = null;
async function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') await audioCtx.resume();
}

function playTone(c, d, p, off = 0) {
  const s = c.currentTime + (p.t || 0) + off;
  const osc = c.createOscillator();
  const amp = c.createGain();
  osc.type = p.waveType || 'sine';
  osc.frequency.setValueAtTime(p.freq, s);
  if (p.slide && p.slide !== p.freq)
    osc.frequency.exponentialRampToValueAtTime(Math.max(p.slide, 1), s + p.dur);
  amp.gain.setValueAtTime(0, s);
  amp.gain.linearRampToValueAtTime(p.gain, s + 0.02);
  amp.gain.exponentialRampToValueAtTime(0.0001, s + p.dur);
  osc.connect(amp); amp.connect(d);
  osc.start(s); osc.stop(s + p.dur + 0.06);
}

function playNoise(c, d, p, off = 0) {
  const s = c.currentTime + (p.t || 0) + off;
  const bufSize = Math.ceil(p.dur * c.sampleRate);
  const buf = c.createBuffer(1, bufSize, c.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  const src = c.createBufferSource(); src.buffer = buf;
  const amp = c.createGain();
  amp.gain.setValueAtTime(p.gain, s);
  amp.gain.exponentialRampToValueAtTime(0.0001, s + p.dur);
  src.connect(amp); amp.connect(d);
  src.start(s); src.stop(s + p.dur + 0.06);
}

function getTotalDuration(layers) {
  let max = 0.05;
  layers.forEach(l => { max = Math.max(max, (l.t || 0) + (l.dur || 0.1)); });
  return max;
}

// Play all layers with repeat + gap, returns total duration in seconds
function playLayers(c, d, layers, repeat, gapSec, startOff = 0) {
  const soundDur = getTotalDuration(layers);
  for (let r = 0; r < repeat; r++) {
    const rOff = startOff + r * (soundDur + gapSec);
    layers.forEach(layer => {
      if (layer.type === 'noise') playNoise(c, d, layer, rOff);
      else playTone(c, d, layer, rOff);
    });
  }
  return soundDur * repeat + gapSec * Math.max(0, repeat - 1);
}

// Preview a single layer (plays it immediately, ignoring its t offset)
async function previewLayer(key, idx) {
  await ensureAudio();
  const layer = { ...getEffectiveLayers(key)[idx], t: 0 };
  const btnEl = document.getElementById(`lplaybtn-${key}-${idx}`);
  if (btnEl) { btnEl.classList.add('playing'); btnEl.textContent = '…'; }
  if (layer.type === 'noise') playNoise(audioCtx, audioCtx.destination, layer, 0);
  else playTone(audioCtx, audioCtx.destination, layer, 0);
  const durMs = layer.dur * 1000 + 200;
  setTimeout(() => {
    if (btnEl) { btnEl.classList.remove('playing'); btnEl.textContent = '▶'; }
  }, durMs);
}

// ═══════════════════════════════════════════════════════
// SOUND DEFINITIONS
// ═══════════════════════════════════════════════════════
const DEFAULTS = {
  boot: {
    icon:'⏻', label:'Boot', desc:'Rising identity emergence',
    layers:[
      {type:'tone',freq:196,slide:392,t:0,dur:1.4,gain:.18,waveType:'sine'},
      {type:'tone',freq:392,slide:null,t:.6,dur:.8,gain:.08,waveType:'sine'}
    ]
  },
  ready: {
    icon:'🍎', label:'Ready', desc:'Single identity tone',
    layers:[{type:'tone',freq:523.25,slide:null,t:0,dur:.9,gain:.16,waveType:'sine'}]
  },
  record: {
    icon:'🔴', label:'Record', desc:'Two-note attention ping',
    layers:[
      {type:'tone',freq:880,slide:null,t:0,dur:.12,gain:.14,waveType:'sine'},
      {type:'tone',freq:1108,slide:null,t:.1,dur:.2,gain:.12,waveType:'sine'}
    ]
  },
  processing: {
    icon:'⚙️', label:'Processing', desc:'Ascend — five-step pitch climb', isCustom:true,
    layers:[
      {type:'tone',freq:220,slide:null,t:0,   dur:.18,gain:.11,waveType:'sine'},
      {type:'tone',freq:247,slide:null,t:.12,  dur:.18,gain:.11,waveType:'sine'},
      {type:'tone',freq:277,slide:null,t:.24,  dur:.18,gain:.11,waveType:'sine'},
      {type:'tone',freq:311,slide:null,t:.36,  dur:.18,gain:.11,waveType:'sine'},
      {type:'tone',freq:349,slide:null,t:.48,  dur:.18,gain:.11,waveType:'sine'}
    ]
  },
  photo: {
    icon:'📷', label:'Photo', desc:'High-freq chirp burst',
    layers:[

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
const state = {};
SLOT_ORDER.forEach(key => {
  state[key] = {
    layers: JSON.parse(JSON.stringify(DEFAULTS[key].layers)),
    savedLayers: null,
    repeat: 1,
    gapSec: 0,
    globalPitch: 0,
    globalSpeed: 1,
    globalVolume: 1,
    modified: false,
    saved: false
  };
});

function getEffectiveLayers(key) {
  const s = state[key];
  const base = s.savedLayers
    ? JSON.parse(JSON.stringify(s.savedLayers))
    : JSON.parse(JSON.stringify(s.layers));
  const pitchMult = Math.pow(2, s.globalPitch / 12);
  return base.map(l => {
    const layer = { ...l };
    if (layer.type === 'tone') {
      layer.freq = layer.freq * pitchMult;
      if (layer.slide) layer.slide = layer.slide * pitchMult;
    }
    layer.t = (layer.t || 0) / s.globalSpeed;
    layer.dur = layer.dur / s.globalSpeed;
    layer.gain = layer.gain * s.globalVolume;
    return layer;
  });
}

let _numCb = null, _numMeta = {};
function openNum(title, sub, cur, min, max, step, cb) {
  _numCb = cb; _numMeta = { min, max, step };
  document.getElementById('numTitle').textContent = title;
  document.getElementById('numSub').textContent = sub;
  document.getElementById('numHint').textContent = `Range: ${min} → ${max}  ·  step ${step}`;
  const inp = document.getElementById('numInput');
  inp.min = min; inp.max = max; inp.step = step; inp.value = cur;
  document.getElementById('numOverlay').classList.add('open');
  setTimeout(() => { inp.focus(); inp.select(); }, 160);
}
function closeNum(e) {
  if (e && e.target !== document.getElementById('numOverlay')) return;
  document.getElementById('numOverlay').classList.remove('open');
  _numCb = null;
}
function confirmNum() {
  const inp = document.getElementById('numInput');
  let v = parseFloat(inp.value);
  v = Math.max(_numMeta.min, Math.min(_numMeta.max, isNaN(v) ? _numMeta.min : v));
  if (_numCb) _numCb(v);
  document.getElementById('numOverlay').classList.remove('open');
  _numCb = null;
}
document.getElementById('numInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmNum();
  if (e.key === 'Escape') { document.getElementById('numOverlay').classList.remove('open'); _numCb = null; }
});

// Helper: build slider+tap-value HTML
// cb is a string expression evaluated when slider moves, 'v' = new numeric value
function mkSlider({ rid, vid, min, max, step, val, dispText, cls, tapTitle, tapSub, cbStr }) {
  return `
    <div class="slider-wrap">
      <input type="range" id="${rid}" class="${cls||''}" min="${min}" max="${max}" step="${step}" value="${val}"
        oninput="onSlider('${rid}','${vid}',${min},${max},${step},'${cbStr}',+this.value)">
      <span class="val-tap${cls ? ' is-global' : ''}" id="${vid}"
        onclick="tapSlider('${rid}','${vid}','${tapTitle}','${tapSub}',${min},${max},${step},'${cbStr}')"
        title="Tap to type">${dispText}</span>
    </div>`;
}

function onSlider(rid, vid, min, max, step, cbStr, v) {
  applySliderVal(rid, vid, cbStr, v);
}

function tapSlider(rid, vid, title, sub, min, max, step, cbStr) {
  const cur = parseFloat(document.getElementById(rid).value);
  openNum(title, sub, cur, min, max, step, (v) => {
    document.getElementById(rid).value = v;
    applySliderVal(rid, vid, cbStr, v);
  });
}

// cbStr is one of: updateLayer|onGlobal|onGap — with args encoded
function applySliderVal(rid, vid, cbStr, v) {
  // Parse the callback string: "fn:arg1:arg2:..."
  const parts = cbStr.split(':');
  const fn = parts[0];
  if (fn === 'upd') {
    // upd:key:i:param
    updateLayer(parts[1], parseInt(parts[2]), parts[3], v);
  } else if (fn === 'glob') {
    // glob:key:type
    onGlobal(parts[1], parts[2], v);
  } else if (fn === 'gap') {
    // gap:key
    onGap(parts[1], v);
  }
}

          <div class="global-ctrl"><label>Volume multiplier</label>${gVolSlider}</div>

function renderLayers(key) {
  const s = state[key];
  const container = document.getElementById(`layers-${key}`);
  container.innerHTML = '';
  s.layers.forEach((layer, i) => {
    const div = document.createElement('div');
    div.className = 'layer-card'; div.id = `layer-${key}-${i}`;
    const summary = layer.type === 'noise'
      ? `noise · dur ${layer.dur.toFixed(3)}s · gain ${layer.gain.toFixed(3)}`
      : `${layer.waveType} · ${layer.freq.toFixed(1)}Hz${layer.slide ? '→'+layer.slide.toFixed(1)+'Hz' : ''} · t${(layer.t||0).toFixed(2)}s`;
    div.innerHTML = `
      <div class="layer-header" id="lhdr-${key}-${i}" onclick="toggleLayer('${key}',${i})">
        <span class="layer-num">${i+1}</span>
        <span class="layer-type-badge">${layer.type}</span>
        <span class="layer-summary">${summary}</span>
        <div class="layer-actions" onclick="event.stopPropagation()">
          <button class="btn-layer-play" id="lplaybtn-${key}-${i}" onclick="previewLayer('${key}',${i})">▶</button>
          <button class="layer-delete" onclick="deleteLayer('${key}',${i})" title="Delete">✕</button>

}

function buildToneParams(key, i, layer) {

function buildNoiseParams(key, i, layer) {

// ═══════════════════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════════════════
function toggleCard(key) {
  const hdr = document.getElementById(`hdr-${key}`);
  const body = document.getElementById(`body-${key}`);
  const open = body.classList.contains('open');
  hdr.classList.toggle('open', !open);
  body.classList.toggle('open', !open);
}

function toggleLayer(key, i) {
  document.getElementById(`lhdr-${key}-${i}`).classList.toggle('open');
  document.getElementById(`lparams-${key}-${i}`).classList.toggle('open');
}

function changeRepeat(key, delta) {
  const s = state[key];
  s.repeat = Math.max(1, Math.min(8, s.repeat + delta));
  document.getElementById(`rep-${key}`).textContent = '×' + s.repeat;
  document.getElementById(`gap-row-${key}`).style.display = s.repeat > 1 ? 'flex' : 'none';
}

function onGap(key, val) {
  state[key].gapSec = +val;
  const el = document.getElementById(`ggap-val-${key}`);
  if (el) el.textContent = (+val).toFixed(1) + 's';
  const rng = document.getElementById(`ggap-${key}`);
  if (rng) rng.value = val;
}

function onGlobal(key, type, val) {
  const s = state[key];
  if (type === 'pitch') {
    s.globalPitch = +val;
    const el = document.getElementById(`gpitch-val-${key}`);
    if (el) el.textContent = (+val >= 0 ? '+' : '') + (+val) + ' st';
    const rng = document.getElementById(`gpitch-${key}`);
    if (rng) rng.value = val;
  } else if (type === 'speed') {
    s.globalSpeed = +val;
    const el = document.getElementById(`gspeed-val-${key}`);
    if (el) el.textContent = '×' + (+val).toFixed(2);
    const rng = document.getElementById(`gspeed-${key}`);
    if (rng) rng.value = val;
  } else if (type === 'vol') {
    s.globalVolume = +val;
    const el = document.getElementById(`gvol-val-${key}`);
    if (el) el.textContent = '×' + (+val).toFixed(2);
    const rng = document.getElementById(`gvol-${key}`);
    if (rng) rng.value = val;
  }
  markModified(key);
}

function updateLayer(key, i, param, val) {
  const layer = state[key].layers[i];
  if (param === 'slide') layer.slide = val === 0 ? null : +val;
  else layer[param] = (param === 'waveType') ? val : +val;

  // Update display text
  const vEl = document.getElementById(`pv-${key}-${i}-${param}`);
  if (vEl) {
    if (param === 'slide') vEl.textContent = +val === 0 ? 'off' : (+val).toFixed(1);
    else if (param === 'freq') vEl.textContent = (+val).toFixed(1);
    else if (param === 'gain') vEl.textContent = (+val).toFixed(3);
    else if (param === 't' || param === 'dur') vEl.textContent = (+val).toFixed(3);
    else vEl.textContent = val;
  }
  // Sync slider position if update came from modal
  const rEl = document.getElementById(`pr-${key}-${i}-${param}`);
  if (rEl && param !== 'waveType') rEl.value = val;

  // Refresh summary line
  const summary = layer.type === 'noise'
    ? `noise · dur ${layer.dur.toFixed(3)}s · gain ${layer.gain.toFixed(3)}`
    : `${layer.waveType} · ${layer.freq.toFixed(1)}Hz${layer.slide ? '→'+layer.slide.toFixed(1)+'Hz' : ''} · t${(layer.t||0).toFixed(2)}s`;
  const sumEl = document.querySelector(`#layer-${key}-${i} .layer-summary`);
  if (sumEl) sumEl.textContent = summary;

  markModified(key);
}

function addLayer(key, type) {
  const newLayer = type === 'noise'
    ? { type:'noise', t:0, dur:.1, gain:.1 }
    : { type:'tone', freq:440, slide:null, t:0, dur:.3, gain:.12, waveType:'sine' };
  state[key].layers.push(newLayer);
  renderLayers(key);
  markModified(key);
  setTimeout(() => toggleLayer(key, state[key].layers.length - 1), 50);
}

function deleteLayer(key, i) {
  if (state[key].layers.length <= 1) { showToast('Need at least one layer'); return; }
  state[key].layers.splice(i, 1);
  renderLayers(key);
  markModified(key);
}

function markModified(key) {
  state[key].modified = true; state[key].saved = false;
  document.getElementById(`card-${key}`).className = 'sound-card modified';
  document.getElementById(`badge-mod-${key}`).style.display = '';
  document.getElementById(`badge-saved-${key}`).style.display = 'none';
}

function saveSound(key) {
  const s = state[key];
  const baked = getEffectiveLayers(key);
  s.savedLayers = JSON.parse(JSON.stringify(baked));
  s.layers = JSON.parse(JSON.stringify(baked));
  s.globalPitch = 0; s.globalSpeed = 1; s.globalVolume = 1;
  s.modified = false; s.saved = true;
  onGlobal(key,'pitch',0); onGlobal(key,'speed',1); onGlobal(key,'vol',1);
  document.getElementById(`card-${key}`).className = 'sound-card saved';
  document.getElementById(`badge-mod-${key}`).style.display = 'none';
  document.getElementById(`badge-saved-${key}`).style.display = '';
  renderLayers(key);
  showToast(`${DEFAULTS[key].label} saved ✓`);
}

function resetSound(key) {
  const s = state[key];
  s.layers = JSON.parse(JSON.stringify(DEFAULTS[key].layers));
  s.savedLayers = null; s.repeat = 1; s.gapSec = 0;
  s.globalPitch = 0; s.globalSpeed = 1; s.globalVolume = 1;
  s.modified = false; s.saved = false;
  document.getElementById(`rep-${key}`).textContent = '×1';
  document.getElementById(`gap-row-${key}`).style.display = 'none';
  onGlobal(key,'pitch',0); onGlobal(key,'speed',1); onGlobal(key,'vol',1);
  const gg = document.getElementById(`ggap-${key}`); if (gg) gg.value = 0;
  const gv = document.getElementById(`ggap-val-${key}`); if (gv) gv.textContent = '0.0s';
  document.getElementById(`card-${key}`).className = 'sound-card';
  document.getElementById(`badge-mod-${key}`).style.display = 'none';
  document.getElementById(`badge-saved-${key}`).style.display = 'none';
  renderLayers(key);
  showToast(`${DEFAULTS[key].label} reset`);
}

// ═══════════════════════════════════════════════════════
// PREVIEW
// ═══════════════════════════════════════════════════════
async function previewSound(key) {
  await ensureAudio();
  const btn = document.getElementById(`playbtn-${key}`);
  btn.classList.add('playing'); btn.textContent = '▶ …';
  const s = state[key];
  const layers = getEffectiveLayers(key);
  const totalDur = playLayers(audioCtx, audioCtx.destination, layers, s.repeat, s.gapSec);
  setTimeout(() => { btn.classList.remove('playing'); btn.textContent = '▶ Preview'; }, totalDur * 1000 + 280);
}

// ═══════════════════════════════════════════════════════
// WAV EXPORT
// ═══════════════════════════════════════════════════════
async function renderToWav(key) {
  const s = state[key];
  const layers = getEffectiveLayers(key);
  const sr = 44100;
  const soundDur = getTotalDuration(layers);
  const totalSecs = soundDur * s.repeat + s.gapSec * Math.max(0, s.repeat - 1) + 0.35;
  const offCtx = new OfflineAudioContext(1, Math.ceil(totalSecs * sr), sr);
  playLayers(offCtx, offCtx.destination, layers, s.repeat, s.gapSec);
  const rendered = await offCtx.startRendering();
  return audioBufferToWav(rendered);
}

function audioBufferToWav(buf) {
  const sr = buf.sampleRate, n = buf.length;
  const ab = new ArrayBuffer(44 + n * 2);
  const v = new DataView(ab);
  const ws = (o, s) => { for (let i=0;i<s.length;i++) v.setUint8(o+i, s.charCodeAt(i)); };
  ws(0,'RIFF'); v.setUint32(4,36+n*2,true); ws(8,'WAVE'); ws(12,'fmt ');
  v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,1,true);
  v.setUint32(24,sr,true); v.setUint32(28,sr*2,true); v.setUint16(32,2,true); v.setUint16(34,16,true);
  ws(36,'data'); v.setUint32(40,n*2,true);
  const ch = buf.getChannelData(0);
  for (let i=0,o=44;i<n;i++,o+=2) {
    const s = Math.max(-1,Math.min(1,ch[i]));
    v.setInt16(o, s<0?s*0x8000:s*0x7FFF, true);
  }
  return new Blob([ab], { type:'audio/wav' });
}

function downloadBlob(blob, name) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 2000);
}

async function exportSingle(key) {
  const st = document.getElementById(`estatus-${key}`);
  st.className = 'export-status visible'; st.textContent = 'Rendering…';
  try {
    const wav = await renderToWav(key);
    const lbl = DEFAULTS[key].label.toLowerCase().replace(/\s/g,'_');
    downloadBlob(wav, `${lbl}${state[key].saved ? '_edited' : ''}.wav`);
    st.className = 'export-status visible ok'; st.textContent = '✓ Downloaded';
    setTimeout(() => { st.className = 'export-status'; }, 3000);
  } catch(e) {
    st.className = 'export-status visible err'; st.textContent = '✗ ' + e.message;
  }
}

async function exportAll() {
  const btn = document.getElementById('exportAllBtn');
  btn.disabled = true; btn.textContent = 'Rendering…';
  try {
    const files = [];
    for (const key of SLOT_ORDER) {
      const wav = await renderToWav(key);
      const lbl = DEFAULTS[key].label.toLowerCase().replace(/\s/g,'_');
      files.push({ name:`${lbl}${state[key].saved?'_edited':''}.wav`, blob:wav });
    }
    downloadBlob(await buildZip(files), 'sounds.zip');
    showToast('All 8 sounds exported');
  } catch(e) { showToast('Export failed: '+e.message); }
  btn.disabled = false; btn.textContent = '⬇ ZIP';
}

// ── Minimal ZIP ──
async function buildZip(files) {
  const ents=[], cds=[];
  let off=0;
  for (const f of files) {
    const nm=new TextEncoder().encode(f.name);
    const dt=new Uint8Array(await f.blob.arrayBuffer());
    const crc=crc32(dt);
    const lh=lfh(nm,dt.length,crc);
    ents.push({lh,dt}); cds.push(cde(nm,dt.length,crc,off));
    off+=lh.length+dt.length;
  }
  const cdSz=cds.reduce((a,b)=>a+b.length,0);
  const parts=[...ents.flatMap(e=>[e.lh,e.dt]),...cds,eocd(files.length,cdSz,off)];
  const tot=parts.reduce((a,b)=>a+b.length,0);
  const out=new Uint8Array(tot);
  let p=0; parts.forEach(x=>{out.set(x,p);p+=x.length;});
  return new Blob([out],{type:'application/zip'});
}
function lfh(n,sz,crc){const h=new Uint8Array(30+n.length),v=new DataView(h.buffer);v.setUint32(0,0x04034b50,true);v.setUint16(4,20,true);v.setUint32(14,crc,true);v.setUint32(18,sz,true);v.setUint32(22,sz,true);v.setUint16(26,n.length,true);h.set(n,30);return h;}
function cde(n,sz,crc,off){const h=new Uint8Array(46+n.length),v=new DataView(h.buffer);v.setUint32(0,0x02014b50,true);v.setUint16(4,20,true);v.setUint16(6,20,true);v.setUint32(16,crc,true);v.setUint32(20,sz,true);v.setUint32(24,sz,true);v.setUint16(28,n.length,true);v.setUint32(42,off,true);h.set(n,46);return h;}
function eocd(cnt,cdSz,cdOff){const h=new Uint8Array(22),v=new DataView(h.buffer);v.setUint32(0,0x06054b50,true);v.setUint16(8,cnt,true);v.setUint16(10,cnt,true);v.setUint32(12,cdSz,true);v.setUint32(16,cdOff,true);return h;}
function crc32(data){let c=0xFFFFFFFF;const t=crc32.t||(crc32.t=(()=>{const t=new Uint32Array(256);for(let i=0;i<256;i++){let x=i;for(let j=0;j<8;j++)x=x&1?(0xEDB88320^(x>>>1)):(x>>>1);t[i]=x;}return t;})());for(let i=0;i<data.length;i++)c=t[(c^data[i])&0xFF]^(c>>>8);return(c^0xFFFFFFFF)>>>0;}

  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}
