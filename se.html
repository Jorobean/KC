<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sound Edit</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0f; --surface: #12121a; --surface2: #0e0e16; --surface3: #16161f;
  --border: #1e1e2e; --border2: #2a2a3e;
  --text: #e8e8f0; --muted: #5a5a7a; --muted2: #3a3a5a;
  --accent: #c8f0a0; --accent2: #f0c8a0; --accent3: #a0c8f0;
  --danger: #f08080; --success: #a0f0c0;
  --glow: rgba(200,240,160,0.12);
}
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  padding-bottom: 60px;
}

/* ── TOP BAR ── */
.top-bar {
position: sticky; top: 0; z-index: 50;
display: flex; align-items: center; justify-content: space-between;
padding: .6rem 1.4rem;
background: var(–bg);
border-bottom: 1px solid var(–border);
gap: 1rem;
}
.top-bar h1 {
font-family: ‘Syne’, sans-serif; font-size: 1rem; font-weight: 800;
letter-spacing: -.02em;
}
.top-bar h1 span { color: var(–accent); }
.top-bar-sub { font-size: .58rem; color: var(–muted); letter-spacing: .1em; text-transform: uppercase; }
.top-actions { display: flex; gap: .5rem; align-items: center; }
.btn-export-all {
background: var(–accent); color: var(–bg); border: none;
border-radius: 3px; padding: .38rem .9rem;
font-family: ‘DM Mono’, monospace; font-size: .68rem; font-weight: 500;
cursor: pointer; letter-spacing: .04em; transition: opacity .15s;
white-space: nowrap;
}
.btn-export-all:hover { opacity: .82; }
.btn-export-all:disabled { opacity: .4; cursor: not-allowed; }

/* ── MAIN LAYOUT ── */
.page { padding: 1.2rem 1.4rem; display: flex; flex-direction: column; gap: .7rem; }

/* ── SOUND CARD ── */
.sound-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 5px;
overflow: hidden;
transition: border-color .2s;
}
.sound-card.modified { border-color: var(–accent2); }
.sound-card.saved { border-color: var(–accent); }

.card-header {
display: flex; align-items: center; gap: .8rem;
padding: .65rem 1rem;
cursor: pointer;
user-select: none;
background: var(–surface2);
border-bottom: 1px solid transparent;
transition: background .15s, border-color .2s;
}
.card-header:hover { background: var(–surface3); }
.card-header.open { border-bottom-color: var(–border); }

.card-icon { font-size: 1.2rem; flex-shrink: 0; }
.card-meta { flex: 1; }
.card-label {
font-family: ‘Syne’, sans-serif; font-weight: 700; font-size: .85rem;
letter-spacing: -.01em; display: flex; align-items: center; gap: .5rem;
}
.card-desc { font-size: .58rem; color: var(–muted); letter-spacing: .04em; margin-top: .1rem; }
.badge {
font-size: .45rem; padding: .06rem .28rem; border-radius: 2px;
letter-spacing: .06em; text-transform: uppercase; border: 1px solid;
vertical-align: middle;
}
.badge-modified { color: var(–accent2); border-color: var(–accent2); }
.badge-saved { color: var(–accent); border-color: var(–accent); }
.badge-custom { color: var(–accent3); border-color: var(–accent3); }

.card-actions { display: flex; gap: .4rem; align-items: center; flex-shrink: 0; }
.card-chevron {
color: var(–muted); font-size: .7rem; transition: transform .2s;
flex-shrink: 0; margin-left: .2rem;
}
.card-header.open .card-chevron { transform: rotate(180deg); }

/* ── ACTION BUTTONS ── */
.btn {
border: 1px solid var(–border); border-radius: 3px;
font-family: ‘DM Mono’, monospace; font-size: .62rem;
padding: .28rem .65rem; cursor: pointer; transition: all .15s;
white-space: nowrap; letter-spacing: .03em;
}
.btn-ghost { background: none; color: var(–muted); }
.btn-ghost:hover { border-color: var(–muted); color: var(–text); }
.btn-play { background: var(–surface2); color: var(–text); }
.btn-play:hover { border-color: var(–accent); color: var(–accent); }
.btn-play.playing { border-color: var(–accent); color: var(–accent); animation: pulse-border .6s ease-in-out infinite alternate; }
.btn-save-card { background: var(–accent); color: var(–bg); border-color: var(–accent); font-weight: 700; }
.btn-save-card:hover { opacity: .82; }
.btn-export-card { background: var(–surface2); color: var(–accent3); border-color: var(–accent3); }
.btn-export-card:hover { background: var(–accent3); color: var(–bg); }
.btn-reset { background: none; color: var(–muted); }
.btn-reset:hover { border-color: var(–danger); color: var(–danger); }
.btn-add-layer { background: none; color: var(–accent); border-color: var(–accent2); border-style: dashed; }
.btn-add-layer:hover { background: var(–glow); }

@keyframes pulse-border { from { box-shadow: 0 0 0 0 rgba(200,240,160,0); } to { box-shadow: 0 0 0 3px rgba(200,240,160,0.2); } }

/* ── EDITOR BODY ── */
.card-body { display: none; padding: 1rem; flex-direction: column; gap: 1rem; }
.card-body.open { display: flex; }

/* ── REPEAT CONTROL ── */
.repeat-row {
display: flex; align-items: center; gap: .8rem;
padding: .55rem .8rem; background: var(–surface2);
border: 1px solid var(–border); border-radius: 4px;
}
.repeat-label { font-size: .6rem; color: var(–muted); letter-spacing: .1em; text-transform: uppercase; flex-shrink: 0; }
.repeat-counter { display: flex; align-items: center; gap: .5rem; }
.rep-btn {
width: 22px; height: 22px; border-radius: 50%;
background: var(–surface); border: 1px solid var(–border);
color: var(–text); font-size: .8rem; cursor: pointer;
display: flex; align-items: center; justify-content: center;
transition: all .15s; line-height: 1;
}
.rep-btn:hover { border-color: var(–accent); color: var(–accent); }
.rep-count { font-size: .85rem; color: var(–accent); min-width: 1.5rem; text-align: center; font-weight: 500; }
.repeat-note { font-size: .55rem; color: var(–muted); margin-left: auto; }

/* ── GLOBAL CONTROLS ── */
.global-section {
background: var(–surface2); border: 1px solid var(–border2);
border-radius: 4px; padding: .7rem .9rem;
}
.section-title {
font-size: .58rem; color: var(–muted); letter-spacing: .12em;
text-transform: uppercase; margin-bottom: .65rem;
display: flex; align-items: center; gap: .6rem;
}
.section-title::after { content: ‘’; flex: 1; height: 1px; background: var(–border); }

.global-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: .6rem; }
.global-ctrl { display: flex; flex-direction: column; gap: .3rem; }
.global-ctrl label { font-size: .55rem; color: var(–muted); letter-spacing: .08em; text-transform: uppercase; }
.global-ctrl .ctrl-row { display: flex; align-items: center; gap: .5rem; }
.ctrl-val { font-size: .65rem; color: var(–accent); min-width: 2.5rem; text-align: right; font-family: ‘DM Mono’, monospace; }

/* ── LAYER LIST ── */
.layers-section { display: flex; flex-direction: column; gap: .5rem; }
.layer-card {
background: var(–surface2); border: 1px solid var(–border);
border-radius: 4px; overflow: hidden;
}
.layer-header {
display: flex; align-items: center; gap: .6rem;
padding: .45rem .7rem; cursor: pointer;
user-select: none; transition: background .15s;
}
.layer-header:hover { background: var(–surface3); }
.layer-num {
width: 18px; height: 18px; border-radius: 50%;
background: var(–border); color: var(–muted);
font-size: .55rem; display: flex; align-items: center; justify-content: center;
flex-shrink: 0;
}
.layer-type-badge {
font-size: .55rem; padding: .04rem .25rem; border-radius: 2px;
background: var(–border); color: var(–muted2);
letter-spacing: .04em; text-transform: uppercase;
}
.layer-summary { font-size: .6rem; color: var(–muted); flex: 1; letter-spacing: .02em; }
.layer-delete {
background: none; border: none; color: var(–muted2); cursor: pointer;
font-size: .75rem; padding: .1rem .3rem; border-radius: 2px;
transition: all .15s; line-height: 1;
}
.layer-delete:hover { color: var(–danger); background: rgba(240,128,128,.1); }
.layer-chevron { color: var(–muted2); font-size: .6rem; transition: transform .2s; flex-shrink: 0; }
.layer-header.open .layer-chevron { transform: rotate(180deg); }

.layer-params { display: none; padding: .6rem .8rem; border-top: 1px solid var(–border); }
.layer-params.open { display: block; }

.param-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: .55rem 1rem; }
.param-item { display: flex; flex-direction: column; gap: .25rem; }
.param-item label { font-size: .55rem; color: var(–muted); letter-spacing: .07em; text-transform: uppercase; }
.param-item .p-row { display: flex; align-items: center; gap: .5rem; }
.param-item .p-val { font-size: .62rem; color: var(–accent); min-width: 2.8rem; text-align: right; }
.param-item select {
width: 100%; background: var(–surface); border: 1px solid var(–border);
border-radius: 3px; padding: .3rem .5rem; color: var(–text);
font-family: ‘DM Mono’, monospace; font-size: .65rem; outline: none; cursor: pointer;
}
.param-item select:focus { border-color: var(–accent); }

/* ── RANGE SLIDERS ── */
input[type=range] {
-webkit-appearance: none; appearance: none;
width: 100%; height: 3px; background: var(–border); border-radius: 2px;
outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
-webkit-appearance: none; width: 12px; height: 12px;
border-radius: 50%; background: var(–accent); cursor: pointer;
}
input[type=range].global-range::-webkit-slider-thumb { background: var(–accent2); }
input[type=range].global-range { background: var(–border2); }

/* ── CARD FOOTER ── */
.card-footer {
display: flex; gap: .5rem; padding: .7rem 1rem;
background: var(–surface2); border-top: 1px solid var(–border);
flex-wrap: wrap; align-items: center;
}
.footer-spacer { flex: 1; }

/* ── NOISE LAYER ── */
.noise-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: .55rem 1rem; }

/* ── PROGRESS / STATUS ── */
.export-status {
font-size: .6rem; color: var(–muted); letter-spacing: .04em;
padding: .3rem .5rem; background: var(–surface2);
border: 1px solid var(–border); border-radius: 3px;
display: none;
}
.export-status.visible { display: block; }
.export-status.ok { color: var(–success); border-color: var(–success); }
.export-status.err { color: var(–danger); border-color: var(–danger); }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(–bg); }
::-webkit-scrollbar-thumb { background: var(–border2); border-radius: 3px; }

/* ── TOAST ── */
.toast {
position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(20px);
background: var(–surface); border: 1px solid var(–accent);
color: var(–accent); padding: .5rem 1.2rem;
border-radius: 4px; font-size: .7rem; letter-spacing: .05em;
opacity: 0; transition: all .25s; z-index: 999; white-space: nowrap;
pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>

</head>
<body>

<div class="top-bar">
  <div>
    <h1>Sound <span>Editor</span></h1>
    <div class="top-bar-sub">8 slots · WAV export</div>
  </div>
  <div class="top-actions">
    <button class="btn-export-all" id="exportAllBtn" onclick="exportAll()">⬇ Export All (ZIP)</button>
  </div>
</div>

<div class="page" id="cardsContainer"></div>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
// AUDIO ENGINE
// ═══════════════════════════════════════════════════════
let audioCtx = null;
async function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') await audioCtx.resume();
}

function playLayers(layers, repeat = 1, ctx = null, dest = null, startOffset = 0) {
  const c = ctx || audioCtx;
  const d = dest || c.destination;
  const totalDur = getTotalDuration(layers);
  const gap = 0.05;
  for (let r = 0; r < repeat; r++) {
    const rOff = startOffset + r * (totalDur + gap);
    layers.forEach(layer => {
      if (layer.type === 'noise') {
        playNoise(c, d, layer, rOff);
      } else {
        playTone(c, d, layer, rOff);
      }
    });
  }
  return totalDur * repeat + gap * (repeat - 1);
}

function playTone(c, d, p, off = 0) {
  const s = c.currentTime + (p.t || 0) + off;
  const osc = c.createOscillator();
  const amp = c.createGain();
  osc.type = p.waveType || 'sine';
  osc.frequency.setValueAtTime(p.freq, s);
  if (p.slide && p.slide !== p.freq) osc.frequency.exponentialRampToValueAtTime(p.slide, s + p.dur);
  amp.gain.setValueAtTime(0, s);
  amp.gain.linearRampToValueAtTime(p.gain, s + 0.02);
  amp.gain.exponentialRampToValueAtTime(0.0001, s + p.dur);
  osc.connect(amp); amp.connect(d);
  osc.start(s); osc.stop(s + p.dur + 0.05);
}

function playNoise(c, d, p, off = 0) {
  const s = c.currentTime + (p.t || 0) + off;
  const bufSize = Math.ceil(p.dur * c.sampleRate);
  const buf = c.createBuffer(1, bufSize, c.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  const src = c.createBufferSource();
  src.buffer = buf;
  const amp = c.createGain();
  amp.gain.setValueAtTime(p.gain, s);
  amp.gain.exponentialRampToValueAtTime(0.0001, s + p.dur);
  src.connect(amp); amp.connect(d);
  src.start(s); src.stop(s + p.dur + 0.05);
}

function getTotalDuration(layers) {
  let max = 0.05;
  layers.forEach(l => { max = Math.max(max, (l.t || 0) + (l.dur || 0.1)); });
  return max;
}

// ═══════════════════════════════════════════════════════
// SOUND DEFINITIONS — original 8 slots
// ═══════════════════════════════════════════════════════
const DEFAULTS = {
  boot: {
    icon: '⏻', label: 'Boot', desc: 'Rising identity emergence',
    layers: [
      { type:'tone', freq:196, slide:392, t:0, dur:1.4, gain:.18, waveType:'sine' },
      { type:'tone', freq:392, slide:null, t:.6, dur:.8, gain:.08, waveType:'sine' }
    ]
  },
  ready: {
    icon: '🍎', label: 'Ready', desc: 'Single identity tone',
    layers: [
      { type:'tone', freq:523.25, slide:null, t:0, dur:.9, gain:.16, waveType:'sine' }
    ]
  },
  record: {
    icon: '🔴', label: 'Record', desc: 'Two-note attention ping',
    layers: [
      { type:'tone', freq:880, slide:null, t:0, dur:.12, gain:.14, waveType:'sine' },
      { type:'tone', freq:1108, slide:null, t:.1, dur:.2, gain:.12, waveType:'sine' }
    ]
  },
  processing: {
    icon: '⚙️', label: 'Processing', desc: 'Ascend — five-step pitch climb',
    isCustom: true,
    layers: [
      { type:'tone', freq:220, slide:null, t:0, dur:.18, gain:.11, waveType:'sine' },
      { type:'tone', freq:247, slide:null, t:.12, dur:.18, gain:.11, waveType:'sine' },
      { type:'tone', freq:277, slide:null, t:.24, dur:.18, gain:.11, waveType:'sine' },
      { type:'tone', freq:311, slide:null, t:.36, dur:.18, gain:.11, waveType:'sine' },
      { type:'tone', freq:349, slide:null, t:.48, dur:.18, gain:.11, waveType:'sine' }
    ]
  },
  photo: {
    icon: '📷', label: 'Photo', desc: 'High-freq chirp burst',
    layers: [
      { type:'tone', freq:4200, slide:null, t:0,   dur:.025, gain:.06, waveType:'square' },
      { type:'tone', freq:4200, slide:null, t:.04,  dur:.025, gain:.06, waveType:'square' },
      { type:'tone', freq:4200, slide:null, t:.08,  dur:.025, gain:.06, waveType:'square' },
      { type:'tone', freq:4200, slide:null, t:.12,  dur:.025, gain:.06, waveType:'square' },
      { type:'tone', freq:4200, slide:null, t:.16,  dur:.025, gain:.06, waveType:'square' },
      { type:'tone', freq:4200, slide:null, t:.2,   dur:.025, gain:.06, waveType:'square' }
    ]
  },
  save: {
    icon: '✅', label: 'Save', desc: 'Apple-style chord confirm',
    layers: [
      { type:'tone', freq:523.25, slide:null, t:0,   dur:.25, gain:.12, waveType:'sine' },
      { type:'tone', freq:659.25, slide:null, t:.08,  dur:.3,  gain:.14, waveType:'sine' },
      { type:'tone', freq:783.99, slide:null, t:.16,  dur:.5,  gain:.16, waveType:'sine' }
    ]
  },
  notify: {
    icon: '🔔', label: 'Notify', desc: 'Shimmer — high stacked sines',
    isCustom: true,
    layers: [
      { type:'tone', freq:2200, slide:null, t:0,    dur:.25, gain:.05, waveType:'sine' },
      { type:'tone', freq:2350, slide:null, t:.06,   dur:.25, gain:.05, waveType:'sine' },
      { type:'tone', freq:2500, slide:null, t:.12,   dur:.25, gain:.05, waveType:'sine' },
      { type:'tone', freq:2650, slide:null, t:.18,   dur:.25, gain:.05, waveType:'sine' }
    ]
  },
  shutdown: {
    icon: '🌑', label: 'Shutdown', desc: 'Resolution collapse descent',
    layers: [
      { type:'tone', freq:392, slide:196, t:0,  dur:1.2, gain:.16, waveType:'sine' },
      { type:'tone', freq:196, slide:null, t:1.1, dur:.25, gain:.06, waveType:'sine' }
    ]
  }
};

const SLOT_ORDER = ['boot','ready','record','processing','photo','save','notify','shutdown'];

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
const state = {};
SLOT_ORDER.forEach(key => {
  state[key] = {
    layers: JSON.parse(JSON.stringify(DEFAULTS[key].layers)),
    savedLayers: null,
    repeat: 1,
    globalPitch: 0,    // semitones
    globalSpeed: 1,    // multiplier
    globalVolume: 1,   // multiplier
    modified: false,
    saved: false
  };
});

// Apply global transforms to get effective layers
function getEffectiveLayers(key) {
  const s = state[key];
  const base = s.savedLayers || s.layers;
  return base.map(l => {
    const layer = { ...l };
    if (layer.type === 'tone') {
      const pitchMult = Math.pow(2, s.globalPitch / 12);
      layer.freq = layer.freq * pitchMult;
      if (layer.slide) layer.slide = layer.slide * pitchMult;
      layer.t = (layer.t || 0) / s.globalSpeed;
      layer.dur = layer.dur / s.globalSpeed;
      layer.gain = layer.gain * s.globalVolume;
    } else {
      layer.t = (layer.t || 0) / s.globalSpeed;
      layer.dur = layer.dur / s.globalSpeed;
      layer.gain = layer.gain * s.globalVolume;
    }
    return layer;
  });
}

// ═══════════════════════════════════════════════════════
// CARD RENDERING
// ═══════════════════════════════════════════════════════
function buildCards() {
  const container = document.getElementById('cardsContainer');
  container.innerHTML = '';
  SLOT_ORDER.forEach(key => renderCard(key, container));
}

function renderCard(key, container) {
  const def = DEFAULTS[key];
  const s = state[key];
  const card = document.createElement('div');
  card.className = 'sound-card';
  card.id = `card-${key}`;
  card.innerHTML = `
    <div class="card-header" id="hdr-${key}" onclick="toggleCard('${key}')">
      <span class="card-icon">${def.icon}</span>
      <div class="card-meta">
        <div class="card-label">
          ${def.label}
          ${def.isCustom ? '<span class="badge badge-custom">custom</span>' : ''}
          <span class="badge badge-modified" id="badge-mod-${key}" style="display:none">unsaved</span>
          <span class="badge badge-saved" id="badge-saved-${key}" style="display:none">saved</span>
        </div>
        <div class="card-desc">${def.desc}</div>
      </div>
      <div class="card-actions" onclick="event.stopPropagation()">
        <button class="btn btn-play" id="playbtn-${key}" onclick="previewSound('${key}')">▶ Preview</button>
      </div>
      <span class="card-chevron">▾</span>
    </div>
    <div class="card-body" id="body-${key}">
      <!-- Repeat -->
      <div class="repeat-row">
        <span class="repeat-label">Repeat</span>
        <div class="repeat-counter">
          <button class="rep-btn" onclick="changeRepeat('${key}',-1)">−</button>
          <span class="rep-count" id="rep-${key}">×1</span>
          <button class="rep-btn" onclick="changeRepeat('${key}',1)">+</button>
        </div>
        <span class="repeat-note">affects preview + export</span>
      </div>

      <!-- Global controls -->
      <div class="global-section">
        <div class="section-title">Global Adjustments</div>
        <div class="global-grid">
          <div class="global-ctrl">
            <label>Pitch Shift</label>
            <div class="ctrl-row">
              <input type="range" class="global-range" min="-24" max="24" step="1" value="0"
                id="gpitch-${key}" oninput="onGlobal('${key}','pitch',this.value)">
              <span class="ctrl-val" id="gpitch-val-${key}">0 st</span>
            </div>
          </div>
          <div class="global-ctrl">
            <label>Speed</label>
            <div class="ctrl-row">
              <input type="range" class="global-range" min="0.25" max="3" step="0.05" value="1"
                id="gspeed-${key}" oninput="onGlobal('${key}','speed',this.value)">
              <span class="ctrl-val" id="gspeed-val-${key}">×1.00</span>
            </div>
          </div>
          <div class="global-ctrl">
            <label>Volume</label>
            <div class="ctrl-row">
              <input type="range" class="global-range" min="0.1" max="3" step="0.05" value="1"
                id="gvol-${key}" oninput="onGlobal('${key}','vol',this.value)">
              <span class="ctrl-val" id="gvol-val-${key}">×1.00</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Layers -->
      <div class="layers-section" id="layers-${key}"></div>
      <button class="btn btn-add-layer" onclick="addLayer('${key}','tone')">+ Add Tone Layer</button>
      <button class="btn btn-add-layer" onclick="addLayer('${key}','noise')" style="margin-top:-.3rem">+ Add Noise Layer</button>

      <!-- Footer -->
      <div class="card-footer">
        <button class="btn btn-reset" onclick="resetSound('${key}')">↺ Reset</button>
        <div class="footer-spacer"></div>
        <span class="export-status" id="estatus-${key}"></span>
        <button class="btn btn-export-card" onclick="exportSingle('${key}')">⬇ Export WAV</button>
        <button class="btn btn-save-card" onclick="saveSound('${key}')">✓ Save</button>
      </div>
    </div>
  `;
  container.appendChild(card);
  renderLayers(key);
}

function renderLayers(key) {
  const s = state[key];
  const container = document.getElementById(`layers-${key}`);
  container.innerHTML = '';
  s.layers.forEach((layer, i) => {
    const div = document.createElement('div');
    div.className = 'layer-card';
    div.id = `layer-${key}-${i}`;
    const summary = layer.type === 'noise'
      ? `noise · dur ${layer.dur.toFixed(3)}s · gain ${layer.gain.toFixed(3)}`
      : `${layer.waveType} · ${layer.freq.toFixed(1)}Hz${layer.slide ? '→'+layer.slide.toFixed(1)+'Hz' : ''} · dur ${layer.dur.toFixed(3)}s`;
    div.innerHTML = `
      <div class="layer-header" id="lhdr-${key}-${i}" onclick="toggleLayer('${key}',${i})">
        <span class="layer-num">${i+1}</span>
        <span class="layer-type-badge">${layer.type}</span>
        <span class="layer-summary">${summary}</span>
        <button class="layer-delete" onclick="event.stopPropagation();deleteLayer('${key}',${i})" title="Delete layer">✕</button>
        <span class="layer-chevron">▾</span>
      </div>
      <div class="layer-params" id="lparams-${key}-${i}">
        ${layer.type === 'noise' ? renderNoiseParams(key,i,layer) : renderToneParams(key,i,layer)}
      </div>
    `;
    container.appendChild(div);
  });
}

function renderToneParams(key, i, layer) {
  return `
    <div class="param-grid">
      <div class="param-item">
        <label>Frequency (Hz)</label>
        <div class="p-row">
          <input type="range" min="20" max="8000" step="1" value="${layer.freq}"
            oninput="updateLayer('${key}',${i},'freq',+this.value)">
          <span class="p-val" id="pv-${key}-${i}-freq">${layer.freq.toFixed(1)}</span>
        </div>
      </div>
      <div class="param-item">
        <label>Slide To (Hz, 0=off)</label>
        <div class="p-row">
          <input type="range" min="0" max="8000" step="1" value="${layer.slide || 0}"
            oninput="updateLayer('${key}',${i},'slide',+this.value)">
          <span class="p-val" id="pv-${key}-${i}-slide">${layer.slide ? layer.slide.toFixed(1) : 'off'}</span>
        </div>
      </div>
      <div class="param-item">
        <label>Start Time (s)</label>
        <div class="p-row">
          <input type="range" min="0" max="3" step="0.01" value="${layer.t||0}"
            oninput="updateLayer('${key}',${i},'t',+this.value)">
          <span class="p-val" id="pv-${key}-${i}-t">${(layer.t||0).toFixed(2)}</span>
        </div>
      </div>
      <div class="param-item">
        <label>Duration (s)</label>
        <div class="p-row">
          <input type="range" min="0.01" max="3" step="0.01" value="${layer.dur}"
            oninput="updateLayer('${key}',${i},'dur',+this.value)">
          <span class="p-val" id="pv-${key}-${i}-dur">${layer.dur.toFixed(3)}</span>
        </div>
      </div>
      <div class="param-item">
        <label>Gain (volume)</label>
        <div class="p-row">
          <input type="range" min="0.01" max="0.5" step="0.005" value="${layer.gain}"
            oninput="updateLayer('${key}',${i},'gain',+this.value)">
          <span class="p-val" id="pv-${key}-${i}-gain">${layer.gain.toFixed(3)}</span>
        </div>
      </div>
      <div class="param-item">
        <label>Wave Type</label>
        <select onchange="updateLayer('${key}',${i},'waveType',this.value)">
          ${['sine','square','triangle','sawtooth'].map(w =>
            `<option value="${w}" ${layer.waveType===w?'selected':''}>${w}</option>`
          ).join('')}
        </select>
      </div>
    </div>

}

function renderNoiseParams(key, i, layer) {
  return `
    <div class="noise-grid">
      <div class="param-item">
        <label>Start Time (s)</label>
        <div class="p-row">
          <input type="range" min="0" max="3" step="0.01" value="${layer.t||0}"
            oninput="updateLayer('${key}',${i},'t',+this.value)">
          <span class="p-val" id="pv-${key}-${i}-t">${(layer.t||0).toFixed(2)}</span>
        </div>
      </div>
      <div class="param-item">
        <label>Duration (s)</label>
        <div class="p-row">
          <input type="range" min="0.01" max="2" step="0.01" value="${layer.dur}"
            oninput="updateLayer('${key}',${i},'dur',+this.value)">

      <div class="param-item">

// ═══════════════════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════════════════
function toggleCard(key) {
  const hdr = document.getElementById(`hdr-${key}`);
  const body = document.getElementById(`body-${key}`);
  const isOpen = body.classList.contains('open');
  hdr.classList.toggle('open', !isOpen);
  body.classList.toggle('open', !isOpen);
}

function toggleLayer(key, i) {
  const hdr = document.getElementById(`lhdr-${key}-${i}`);
  const params = document.getElementById(`lparams-${key}-${i}`);
  hdr.classList.toggle('open');
  params.classList.toggle('open');
}

function changeRepeat(key, delta) {
  const s = state[key];
  s.repeat = Math.max(1, Math.min(8, s.repeat + delta));
  document.getElementById(`rep-${key}`).textContent = '×' + s.repeat;
}

function onGlobal(key, type, val) {
  const s = state[key];
  if (type === 'pitch') {
    s.globalPitch = +val;
    document.getElementById(`gpitch-val-${key}`).textContent = (val >= 0 ? '+' : '') + val + ' st';
  } else if (type === 'speed') {
    s.globalSpeed = +val;
    document.getElementById(`gspeed-val-${key}`).textContent = '×' + (+val).toFixed(2);
  } else if (type === 'vol') {
    s.globalVolume = +val;
    document.getElementById(`gvol-val-${key}`).textContent = '×' + (+val).toFixed(2);
  }
  markModified(key);
}

function updateLayer(key, i, param, val) {
  const layer = state[key].layers[i];
  if (param === 'slide') { layer.slide = val === 0 ? null : val; }
  else { layer[param] = val; }

  // Update display value
  const el = document.getElementById(`pv-${key}-${i}-${param}`);
  if (el) {
    if (param === 'slide') el.textContent = val === 0 ? 'off' : val.toFixed(1);
    else if (param === 'freq') el.textContent = val.toFixed(1);
    else if (param === 'gain') el.textContent = val.toFixed(3);
    else if (param === 't' || param === 'dur') el.textContent = val.toFixed(3);
    else el.textContent = val;
  }

  // Update layer summary
  const summary = layer.type === 'noise'
    ? `noise · dur ${layer.dur.toFixed(3)}s · gain ${layer.gain.toFixed(3)}`
    : `${layer.waveType} · ${layer.freq.toFixed(1)}Hz${layer.slide ? '→'+layer.slide.toFixed(1)+'Hz' : ''} · dur ${layer.dur.toFixed(3)}s`;
  const sumEl = document.querySelector(`#layer-${key}-${i} .layer-summary`);
  if (sumEl) sumEl.textContent = summary;

  markModified(key);
}

function addLayer(key, type) {
  const newLayer = type === 'noise'
    ? { type:'noise', t:0, dur:.1, gain:.1 }
    : { type:'tone', freq:440, slide:null, t:0, dur:.3, gain:.12, waveType:'sine' };
  state[key].layers.push(newLayer);
  renderLayers(key);
  markModified(key);
  // Open the new layer
  const i = state[key].layers.length - 1;
  setTimeout(() => toggleLayer(key, i), 50);
}

function deleteLayer(key, i) {
  if (state[key].layers.length <= 1) { showToast('Need at least one layer'); return; }
  state[key].layers.splice(i, 1);
  renderLayers(key);
  markModified(key);
}

function markModified(key) {
  state[key].modified = true;
  state[key].saved = false;
  document.getElementById(`card-${key}`).className = 'sound-card modified';
  document.getElementById(`badge-mod-${key}`).style.display = '';
  document.getElementById(`badge-saved-${key}`).style.display = 'none';
}

function saveSound(key) {
  const s = state[key];
  // Bake globals into layers
  const baked = getEffectiveLayers(key).map(l => ({ ...l }));
  s.savedLayers = baked;
  s.layers = JSON.parse(JSON.stringify(baked));
  s.globalPitch = 0; s.globalSpeed = 1; s.globalVolume = 1;
  s.modified = false; s.saved = true;
  // Reset global sliders
  document.getElementById(`gpitch-${key}`).value = 0;
  document.getElementById(`gspeed-${key}`).value = 1;
  document.getElementById(`gvol-${key}`).value = 1;
  document.getElementById(`gpitch-val-${key}`).textContent = '0 st';
  document.getElementById(`gspeed-val-${key}`).textContent = '×1.00';
  document.getElementById(`gvol-val-${key}`).textContent = '×1.00';
  document.getElementById(`card-${key}`).className = 'sound-card saved';
  document.getElementById(`badge-mod-${key}`).style.display = 'none';
  document.getElementById(`badge-saved-${key}`).style.display = '';
  renderLayers(key);
  showToast(`${DEFAULTS[key].label} saved`);
}

function resetSound(key) {
  const s = state[key];
  s.layers = JSON.parse(JSON.stringify(DEFAULTS[key].layers));
  s.savedLayers = null;
  s.repeat = 1;
  s.globalPitch = 0; s.globalSpeed = 1; s.globalVolume = 1;
  s.modified = false; s.saved = false;
  document.getElementById(`gpitch-${key}`).value = 0;
  document.getElementById(`gspeed-${key}`).value = 1;
  document.getElementById(`gvol-${key}`).value = 1;
  document.getElementById(`gpitch-val-${key}`).textContent = '0 st';
  document.getElementById(`gspeed-val-${key}`).textContent = '×1.00';
  document.getElementById(`gvol-val-${key}`).textContent = '×1.00';
  document.getElementById(`rep-${key}`).textContent = '×1';
  document.getElementById(`card-${key}`).className = 'sound-card';
  document.getElementById(`badge-mod-${key}`).style.display = 'none';
  document.getElementById(`badge-saved-${key}`).style.display = 'none';
  renderLayers(key);
  showToast(`${DEFAULTS[key].label} reset to default`);
}

// ═══════════════════════════════════════════════════════
// PREVIEW
// ═══════════════════════════════════════════════════════
async function previewSound(key) {
  await ensureAudio();
  const btn = document.getElementById(`playbtn-${key}`);
  btn.classList.add('playing');
  btn.textContent = '▶ Playing…';
  const layers = getEffectiveLayers(key);
  const s = state[key];
  playLayers(layers, s.repeat);
  const totalMs = (getTotalDuration(layers) * s.repeat + 0.05 * (s.repeat-1)) * 1000 + 200;
  setTimeout(() => { btn.classList.remove('playing'); btn.textContent = '▶ Preview'; }, totalMs);
}

// ═══════════════════════════════════════════════════════
// WAV EXPORT
// ═══════════════════════════════════════════════════════
async function renderToWav(key) {
  const s = state[key];
  const layers = getEffectiveLayers(key);
  const sampleRate = 44100;
  const totalDur = getTotalDuration(layers);
  const gap = 0.05;
  const totalSecs = totalDur * s.repeat + gap * Math.max(0, s.repeat - 1) + 0.3;
  const offlineCtx = new OfflineAudioContext(1, Math.ceil(totalSecs * sampleRate), sampleRate);

  for (let r = 0; r < s.repeat; r++) {
    const offset = r * (totalDur + gap);
    layers.forEach(layer => {
      if (layer.type === 'noise') {
        playNoise(offlineCtx, offlineCtx.destination, layer, offset);
      } else {
        playTone(offlineCtx, offlineCtx.destination, layer, offset);
      }
    });
  }

  const rendered = await offlineCtx.startRendering();
  return audioBufferToWav(rendered);
}

function audioBufferToWav(buffer) {
  const numCh = buffer.numberOfChannels;
  const sampleRate = buffer.sampleRate;
  const numSamples = buffer.length;
  const bytesPerSample = 2;
  const blockAlign = numCh * bytesPerSample;
  const byteRate = sampleRate * blockAlign;
  const dataSize = numSamples * blockAlign;
  const wavBuf = new ArrayBuffer(44 + dataSize);
  const view = new DataView(wavBuf);
  const writeStr = (off, str) => { for (let i=0;i<str.length;i++) view.setUint8(off+i, str.charCodeAt(i)); };
  writeStr(0, 'RIFF');
  view.setUint32(4, 36 + dataSize, true);
  writeStr(8, 'WAVE');
  writeStr(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, numCh, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, byteRate, true);
  view.setUint16(32, blockAlign, true);
  view.setUint16(34, bytesPerSample * 8, true);
  writeStr(36, 'data');
  view.setUint32(40, dataSize, true);
  const ch = buffer.getChannelData(0);
  let off = 44;
  for (let i = 0; i < numSamples; i++) {
    const s = Math.max(-1, Math.min(1, ch[i]));
    view.setInt16(off, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
    off += 2;
  }
  return new Blob([wavBuf], { type: 'audio/wav' });
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 2000);
}

async function exportSingle(key) {
  const statusEl = document.getElementById(`estatus-${key}`);
  statusEl.className = 'export-status visible';
  statusEl.textContent = 'Rendering…';
  try {
    const wav = await renderToWav(key);
    const label = DEFAULTS[key].label.toLowerCase().replace(/\s/g,'_');
    const s = state[key];
    const suffix = s.saved ? '_edited' : '';
    downloadBlob(wav, `${label}${suffix}.wav`);
    statusEl.className = 'export-status visible ok';
    statusEl.textContent = '✓ Downloaded';
    setTimeout(() => { statusEl.className = 'export-status'; }, 3000);
  } catch(e) {
    statusEl.className = 'export-status visible err';
    statusEl.textContent = '✗ Error: ' + e.message;
  }
}

async function exportAll() {
  const btn = document.getElementById('exportAllBtn');
  btn.disabled = true;
  btn.textContent = 'Rendering…';

  try {
    // Render all WAVs
    const files = [];
    for (const key of SLOT_ORDER) {
      const wav = await renderToWav(key);
      const label = DEFAULTS[key].label.toLowerCase().replace(/\s/g,'_');
      const s = state[key];
      const suffix = s.saved ? '_edited' : '';
      files.push({ name: `${label}${suffix}.wav`, blob: wav });
    }

    // Build ZIP using pure JS
    const zip = await buildZip(files);
    downloadBlob(zip, 'sounds.zip');
    showToast('All 8 sounds exported');
  } catch(e) {
    showToast('Export failed: ' + e.message);
  }
  btn.disabled = false;
  btn.textContent = '⬇ Export All (ZIP)';
}

// ── Minimal ZIP builder ──
async function buildZip(files) {
  const entries = [];
  let offset = 0;
  const centralDir = [];

  for (const f of files) {
    const nameBytes = new TextEncoder().encode(f.name);
    const data = new Uint8Array(await f.blob.arrayBuffer());
    const crc = crc32(data);
    const localHeader = localFileHeader(nameBytes, data.length, crc);
    entries.push({ localHeader, data, nameBytes, crc, offset });
    centralDir.push(centralDirEntry(nameBytes, data.length, crc, offset));
    offset += localHeader.length + data.length;
  }

  const cdSize = centralDir.reduce((a,b) => a+b.length, 0);
  const eocd = endOfCentralDir(files.length, cdSize, offset);
  const parts = [...entries.flatMap(e => [e.localHeader, e.data]), ...centralDir, eocd];
  const total = parts.reduce((a,b) => a+b.length, 0);
  const out = new Uint8Array(total);
  let pos = 0;
  parts.forEach(p => { out.set(p, pos); pos += p.length; });
  return new Blob([out], { type: 'application/zip' });
}

function localFileHeader(name, size, crc) {
  const h = new Uint8Array(30 + name.length);
  const v = new DataView(h.buffer);
  v.setUint32(0, 0x04034b50, true); v.setUint16(4, 20, true); v.setUint16(6, 0, true);
  v.setUint16(8, 0, true); v.setUint16(10, 0, true); v.setUint16(12, 0, true);
  v.setUint32(14, crc, true); v.setUint32(18, size, true); v.setUint32(22, size, true);
  v.setUint16(26, name.length, true); v.setUint16(28, 0, true);
  h.set(name, 30);
  return h;
}

function centralDirEntry(name, size, crc, offset) {
  const h = new Uint8Array(46 + name.length);
  const v = new DataView(h.buffer);
  v.setUint32(0, 0x02014b50, true); v.setUint16(4, 20, true); v.setUint16(6, 20, true);
  v.setUint16(8, 0, true); v.setUint16(10, 0, true); v.setUint16(12, 0, true); v.setUint16(14, 0, true);
  v.setUint32(16, crc, true); v.setUint32(20, size, true); v.setUint32(24, size, true);
  v.setUint16(28, name.length, true); v.setUint16(30, 0, true); v.setUint16(32, 0, true);
  v.setUint16(34, 0, true); v.setUint16(36, 0, true); v.setUint32(38, 0, true);
  v.setUint32(42, offset, true);
  h.set(name, 46);
  return h;
}

function endOfCentralDir(count, cdSize, cdOffset) {
  const h = new Uint8Array(22);
  const v = new DataView(h.buffer);
  v.setUint32(0, 0x06054b50, true); v.setUint16(4, 0, true); v.setUint16(6, 0, true);
  v.setUint16(8, count, true); v.setUint16(10, count, true);
  v.setUint32(12, cdSize, true); v.setUint32(16, cdOffset, true); v.setUint16(20, 0, true);
  return h;
}

function crc32(data) {
  let crc = 0xFFFFFFFF;
  const table = crc32.table || (crc32.table = (() => {
    const t = new Uint32Array(256);
    for (let i=0;i<256;i++){let c=i;for(let j=0;j<8;j++)c=c&1?(0xEDB88320^(c>>>1)):(c>>>1);t[i]=c;}
    return t;
  })());
  for (let i = 0; i < data.length; i++) crc = table[(crc ^ data[i]) & 0xFF] ^ (crc >>> 8);
  return (crc ^ 0xFFFFFFFF) >>> 0;
}

// ═══════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

document.addEventListener('click', () => ensureAudio(), { once: true });
